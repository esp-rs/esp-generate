#INCLUDEFILE false

# Each module option declares:
#   * `compatible.chip`     — limits it to its matching chip(s); the rest
#                             are pruned at tree-build time by
#                             `prune_chip_incompatible_options`.
#   * `sets.remove_pins`    — limitation tags (from `esp_metadata_generated`
#                             pin info) that the module reserves; the
#                             generator emits `let _ = peripherals.GPIOn;`
#                             stanzas for every chip pin that carries any
#                             of these tags.

!Category
name: module
display_name: Module/Board selection
help: Select your specific ESP32 module. This selection is optional, but it will generate code to help you avoid using reserved GPIOs.
options:
  # ----- ESP32 -----
  - !Option
    name: esp32-wroom-32e
    display_name: ESP32-WROOM-32E/32UE (4/8/16MB flash)
    selection_group: module
    compatible:
      chip: [esp32]
    sets:
      remove_pins: [spi_flash, esp32_pico_v3]
